name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable
  GO_VERSION: "1.22"

permissions:
  contents: read

jobs:
  android:
    name: Build Android artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build universal APK
        run: flutter build apk --release

      - name: Stage universal APK
        run: |
          mkdir -p dist/android
          cp build/app/outputs/flutter-apk/app-release.apk dist/android/app-release.apk

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          if-no-files-found: error
          path: |
            client/dist/android/app-release.apk
            client/build/app/outputs/flutter-apk/*-release.apk
            client/build/app/outputs/bundle/release/app-release.aab

      - name: Publish Android APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/android/app-release.apk

  ios:
    name: Build iOS artifact
    runs-on: macos-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without code signing
        run: flutter build ios --release --no-codesign

      - name: Package iOS app
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app ../ios-release.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          if-no-files-found: error
          path: ios-release.zip

  go-binaries:
    name: Build Go binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/gpt-image-backend-${GOOS}-${GOARCH}${{ matrix.ext }}" ./cmd/gpt-image-backend

      - name: Upload Go binary
        uses: actions/upload-artifact@v4
        with:
          name: gpt-image-backend-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          path: dist/gpt-image-backend-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  docker:
    name: Build and publish Docker image
    needs: go-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: gpt-image-backend:pr-${{ github.event.pull_request.number }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gpt-image-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
