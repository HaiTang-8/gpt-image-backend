<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proxy 日志控制台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: oklch(0.965 0.014 82);
      --paper: oklch(0.992 0.006 86);
      --ink: oklch(0.19 0.018 248);
      --muted: oklch(0.47 0.028 248);
      --line: oklch(0.86 0.018 82);
      --field: oklch(0.975 0.008 86);
      --teal: oklch(0.49 0.095 190);
      --teal-soft: oklch(0.91 0.055 190);
      --amber: oklch(0.68 0.135 74);
      --red: oklch(0.58 0.17 28);
      --green: oklch(0.52 0.12 145);
      --violet: oklch(0.5 0.11 300);
      --shadow: 0 20px 50px color-mix(in oklch, var(--ink) 12%, transparent);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 14px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
      padding: 22px clamp(18px, 4vw, 44px) 18px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklch, var(--paper) 82%, transparent);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1;
      font-weight: 720;
    }

    .brand p {
      margin: 7px 0 0;
      color: var(--muted);
    }

    .auth {
      display: grid;
      grid-template-columns: minmax(180px, 280px) auto auto;
      gap: 8px;
      align-items: center;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1.3fr) repeat(6, minmax(120px, 1fr)) auto;
      gap: 10px;
      padding: 14px clamp(18px, 4vw, 44px);
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklch, var(--paper) 70%, var(--bg));
    }

    input,
    select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field);
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--teal) 18%, transparent);
    }

    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: oklch(0.985 0.006 86);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.6fr);
      gap: 18px;
      padding: 20px clamp(18px, 4vw, 44px) 32px;
      align-items: start;
    }

    .metrics {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
    }

    .metric,
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 14px;
      min-height: 88px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
    }

    .metric .value {
      margin-top: 10px;
      font-family: "DIN Alternate", "Avenir Next", sans-serif;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 720;
      line-height: 1;
    }

    .metric .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 720;
    }

    .panel-body {
      padding: 14px 16px 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 620;
      background: color-mix(in oklch, var(--paper) 88%, var(--bg));
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr.log-row {
      cursor: pointer;
    }

    tr.log-row:hover,
    tr.log-row.selected {
      background: color-mix(in oklch, var(--teal-soft) 44%, transparent);
    }

    .logs-scroll {
      max-height: min(68vh, 760px);
      overflow: auto;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      height: 24px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
    }

    .status.ok {
      color: var(--green);
      background: color-mix(in oklch, var(--green) 12%, transparent);
    }

    .status.warn {
      color: var(--amber);
      background: color-mix(in oklch, var(--amber) 16%, transparent);
    }

    .status.bad {
      color: var(--red);
      background: color-mix(in oklch, var(--red) 12%, transparent);
    }

    .split {
      display: grid;
      gap: 18px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
      min-width: 0;
    }

    .field span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .field strong {
      display: block;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }

    pre {
      margin: 12px 0 0;
      padding: 12px;
      max-height: 280px;
      overflow: auto;
      border-radius: 6px;
      background: oklch(0.23 0.018 248);
      color: oklch(0.96 0.012 86);
      font: 12px/1.5 "SFMono-Regular", Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .bucket {
      display: grid;
      grid-template-columns: minmax(84px, 0.8fr) minmax(120px, 1.8fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 30px;
    }

    .bucket-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: var(--line);
      overflow: hidden;
    }

    .bar i {
      display: block;
      height: 100%;
      width: var(--w);
      background: var(--teal);
    }

    .bucket:nth-child(3n) .bar i {
      background: var(--amber);
    }

    .bucket:nth-child(4n) .bar i {
      background: var(--violet);
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 16px;
    }

    .empty,
    .error {
      color: var(--muted);
      padding: 18px 0;
    }

    .error {
      color: var(--red);
    }

    .files {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .section-label {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .file {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field);
      overflow-wrap: anywhere;
    }

    @media (max-width: 1180px) {
      .filters,
      .metrics,
      .content {
        grid-template-columns: 1fr 1fr;
      }

      .content > .metrics,
      .logs-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .topbar,
      .auth,
      .filters,
      .metrics,
      .content,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        position: static;
      }

      .logs-scroll {
        max-height: none;
      }

      th:nth-child(2),
      td:nth-child(2),
      th:nth-child(4),
      td:nth-child(4),
      th:nth-child(7),
      td:nth-child(7) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Proxy 日志控制台</h1>
        <p id="statusLine">请输入 Proxy API key 后连接。</p>
      </div>
      <div class="auth">
        <input id="apiKey" type="password" autocomplete="off" placeholder="Proxy API key">
        <button id="saveKey">保存 API key</button>
        <button id="refresh" class="primary">刷新</button>
      </div>
    </header>

    <section class="filters" aria-label="筛选">
      <input id="search" placeholder="搜索 ID、摘要、body、error">
      <input id="userId" placeholder="用户">
      <input id="endpoint" placeholder="Endpoint">
      <input id="model" placeholder="Model">
      <input id="upstream" placeholder="Upstream">
      <input id="from" type="date" aria-label="开始日期">
      <input id="to" type="date" aria-label="结束日期">
      <select id="status">
        <option value="">全部 Status</option>
        <option value="200">200</option>
        <option value="400">400</option>
        <option value="401">401</option>
        <option value="429">429</option>
        <option value="500">500</option>
        <option value="502">502</option>
      </select>
    </section>

    <main class="content">
      <section class="metrics" id="metrics"></section>

      <section class="panel logs-panel">
        <div class="panel-head">
          <h2>请求</h2>
          <span id="countLine"></span>
        </div>
        <div class="logs-scroll">
          <table>
            <thead>
              <tr>
                <th style="width: 142px">时间</th>
                <th style="width: 84px">用户</th>
                <th style="width: 168px">Endpoint</th>
                <th style="width: 132px">Model</th>
                <th style="width: 74px">Status</th>
                <th style="width: 86px">延迟</th>
                <th style="width: 92px">字节</th>
                <th>摘要</th>
              </tr>
            </thead>
            <tbody id="logs"></tbody>
          </table>
        </div>
        <div class="pager">
          <button id="prevPage">上一页</button>
          <span id="pageLine"></span>
          <button id="nextPage">下一页</button>
        </div>
      </section>

      <aside class="split">
        <section class="panel">
          <div class="panel-head">
            <h2>选中日志</h2>
          </div>
          <div class="panel-body" id="detail"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>分析</h2>
          </div>
          <div class="panel-body" id="analysis"></div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    const state = {
      limit: 50,
      offset: 0,
      total: 0,
      logs: [],
      selectedId: "",
      loading: false
    };

    const el = (id) => document.getElementById(id);
    const fields = ["search", "userId", "endpoint", "model", "upstream", "from", "to", "status"];

    el("apiKey").value = sessionStorage.getItem("proxy_admin_key") || "";
    el("saveKey").addEventListener("click", () => {
      sessionStorage.setItem("proxy_admin_key", el("apiKey").value.trim());
      load();
    });
    el("refresh").addEventListener("click", () => load());
    el("prevPage").addEventListener("click", () => {
      state.offset = Math.max(0, state.offset - state.limit);
      load();
    });
    el("nextPage").addEventListener("click", () => {
      if (state.offset + state.limit < state.total) {
        state.offset += state.limit;
        load();
      }
    });
    fields.forEach((id) => {
      el(id).addEventListener("change", () => {
        state.offset = 0;
        load();
      });
      if (id !== "from" && id !== "to" && id !== "status") {
        el(id).addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            state.offset = 0;
            load();
          }
        });
      }
    });

    function params() {
      const p = new URLSearchParams();
      p.set("limit", state.limit);
      p.set("offset", state.offset);
      const map = {
        search: "q",
        userId: "user_id",
        endpoint: "endpoint",
        model: "model",
        upstream: "upstream_id",
        from: "from",
        to: "to",
        status: "status"
      };
      Object.entries(map).forEach(([id, name]) => {
        const value = el(id).value.trim();
        if (value) p.set(name, value);
      });
      return p.toString();
    }

    async function api(path) {
      const key = el("apiKey").value.trim() || sessionStorage.getItem("proxy_admin_key") || "";
      const headers = key ? { Authorization: `Bearer ${key}` } : {};
      const response = await fetch(path, { headers });
      const text = await response.text();
      let data = {};
      if (text) {
        try {
          data = JSON.parse(text);
        } catch (error) {
          throw new Error(text);
        }
      }
      if (!response.ok) {
        throw new Error(data.error || response.statusText);
      }
      return data;
    }

    async function load() {
      if (state.loading) return;
      state.loading = true;
      el("statusLine").textContent = "正在加载日志和分析...";
      try {
        const query = params();
        const [logs, stats] = await Promise.all([
          api(`/admin/api/logs?${query}`),
          api(`/admin/api/stats?${query}`)
        ]);
        state.logs = logs.items || [];
        state.total = logs.total || 0;
        if (!state.logs.some((item) => item.id === state.selectedId)) {
          state.selectedId = state.logs[0]?.id || "";
        }
        renderMetrics(stats);
        renderLogs();
        renderDetail();
        renderAnalysis(stats);
        el("statusLine").textContent = `已更新 ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        el("statusLine").textContent = error.message === "unauthorized" ? "需要 API key 或 API key 被拒绝。" : error.message;
        renderError(error.message);
      } finally {
        state.loading = false;
      }
    }

    function renderMetrics(stats) {
      const total = stats.total_requests || 0;
      const errors = stats.error_requests || 0;
      const successRate = total ? Math.round(((stats.success_requests || 0) / total) * 1000) / 10 : 0;
      const cards = [
        ["请求", formatNumber(total), `${formatNumber(errors)} 个错误`],
        ["成功率", `${successRate}%`, `${formatNumber(stats.success_requests || 0)} 次成功`],
        ["平均延迟", formatDuration(stats.average_duration_ms || 0), "当前筛选日志"],
        ["Response", formatBytes(stats.response_bytes || 0), "总字节数"],
        ["文件", formatNumber(stats.file_count || 0), formatBytes(stats.file_bytes || 0)],
        ["Tokens", formatNumber(stats.usage?.total_tokens || 0), `${formatNumber(stats.usage?.prompt_tokens || 0)} prompt`]
      ];
      el("metrics").innerHTML = cards.map(([label, value, sub]) => `
        <article class="metric">
          <div class="label">${escapeHTML(label)}</div>
          <div class="value">${escapeHTML(value)}</div>
          <div class="sub">${escapeHTML(sub)}</div>
        </article>
      `).join("");
    }

    function renderLogs() {
      el("countLine").textContent = `共 ${formatNumber(state.total)} 条`;
      el("pageLine").textContent = `${state.offset + 1}-${Math.min(state.offset + state.limit, state.total)} / ${state.total}`;
      el("prevPage").disabled = state.offset === 0;
      el("nextPage").disabled = state.offset + state.limit >= state.total;
      if (!state.logs.length) {
        el("logs").innerHTML = `<tr><td colspan="8"><div class="empty">没有匹配的日志。</div></td></tr>`;
        return;
      }
      el("logs").innerHTML = state.logs.map((item) => `
        <tr class="log-row ${item.id === state.selectedId ? "selected" : ""}" data-id="${escapeAttr(item.id)}">
          <td title="${escapeAttr(item.created_at)}">${escapeHTML(formatTime(item.created_at))}</td>
          <td title="${escapeAttr(item.user_id)}">${escapeHTML(item.user_id || "-")}</td>
          <td title="${escapeAttr(item.endpoint)}">${escapeHTML(item.endpoint || "-")}</td>
          <td title="${escapeAttr(item.model)}">${escapeHTML(item.model || "-")}</td>
          <td><span class="status ${statusTone(item.status_code)}">${escapeHTML(String(item.status_code || 0))}</span></td>
          <td>${escapeHTML(formatDuration(item.duration_ms || 0))}</td>
          <td>${escapeHTML(formatBytes(item.response_size || 0))}</td>
          <td title="${escapeAttr(item.request_summary || item.error || item.id)}">${escapeHTML(item.request_summary || item.error || item.id)}</td>
        </tr>
      `).join("");
      document.querySelectorAll(".log-row").forEach((row) => {
        row.addEventListener("click", () => {
          state.selectedId = row.dataset.id;
          renderLogs();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const item = state.logs.find((log) => log.id === state.selectedId);
      if (!item) {
        el("detail").innerHTML = `<div class="empty">请选择一个请求。</div>`;
        return;
      }
      const files = item.files?.length ? item.files.map((file) => `
        <div class="file">
          <strong>${escapeHTML(file.filename || "-")}</strong><br>
          ${escapeHTML(file.field_name || "-")} / ${escapeHTML(file.content_type || "-")} / ${escapeHTML(formatBytes(file.size_bytes || 0))}
        </div>
      `).join("") : `<div class="empty">没有文件元数据。</div>`;
      el("detail").innerHTML = `
        <div class="detail-grid">
          ${field("Request ID", item.id)}
          ${field("创建时间", formatTime(item.created_at))}
          ${field("用户", item.user_id || "-")}
          ${field("Upstream", item.upstream_id || "-")}
          ${field("Endpoint", item.endpoint || "-")}
          ${field("Model", item.model || "-")}
          ${field("Status", String(item.status_code || 0))}
          ${field("延迟", formatDuration(item.duration_ms || 0))}
        </div>
        ${item.error ? `<pre>${escapeHTML(item.error)}</pre>` : ""}
        <h3 class="section-label">Request body</h3>
        <pre>${escapeHTML(pretty(item.request_json) || "没有存储的 Request body。")}</pre>
        <h3 class="section-label">Response body</h3>
        <pre>${escapeHTML(pretty(item.response_json) || "没有存储的 Response body。")}</pre>
        <h3 class="section-label">Usage</h3>
        <pre>${escapeHTML(pretty(item.usage_json) || "没有 Usage payload。")}</pre>
        <div class="files">${files}</div>
      `;
    }

    function renderAnalysis(stats) {
      el("analysis").innerHTML = `
        ${bucketSection("时间线", stats.timeline || [])}
        ${bucketSection("Status", stats.by_status || [])}
        ${bucketSection("Models", stats.by_model || [])}
        ${bucketSection("Endpoints", stats.by_endpoint || [])}
        ${bucketSection("用户", stats.by_user || [])}
        ${bucketSection("Upstreams", stats.by_upstream || [])}
      `;
    }

    function bucketSection(title, buckets) {
      const max = Math.max(1, ...buckets.map((b) => b.count || 0));
      const rows = buckets.length ? buckets.map((b) => `
        <div class="bucket">
          <div class="bucket-name" title="${escapeAttr(b.key)}">${escapeHTML(b.key || "-")}</div>
          <div class="bar"><i style="--w:${Math.max(3, ((b.count || 0) / max) * 100)}%"></i></div>
          <div>${escapeHTML(formatNumber(b.count || 0))}</div>
        </div>
      `).join("") : `<div class="empty">暂无数据。</div>`;
      return `<h3 style="margin:18px 0 10px;font-size:13px">${escapeHTML(title)}</h3>${rows}`;
    }

    function field(label, value) {
      return `<div class="field"><span>${escapeHTML(label)}</span><strong>${escapeHTML(value)}</strong></div>`;
    }

    function renderError(message) {
      el("metrics").innerHTML = "";
      el("logs").innerHTML = `<tr><td colspan="8"><div class="error">${escapeHTML(message)}</div></td></tr>`;
      el("detail").innerHTML = `<div class="empty">未选择请求。</div>`;
      el("analysis").innerHTML = `<div class="empty">未加载分析。</div>`;
      el("countLine").textContent = "";
      el("pageLine").textContent = "";
    }

    function pretty(raw) {
      if (!raw) return "";
      try {
        return JSON.stringify(JSON.parse(raw), null, 2);
      } catch (error) {
        return raw;
      }
    }

    function statusTone(status) {
      if (status >= 500 || status === 0) return "bad";
      if (status >= 400) return "warn";
      return "ok";
    }

    function formatTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function formatDuration(value) {
      if (value >= 1000) return `${(value / 1000).toFixed(2)}s`;
      return `${Math.round(value)}ms`;
    }

    function formatBytes(value) {
      const units = ["B", "KB", "MB", "GB"];
      let size = Number(value) || 0;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit += 1;
      }
      return `${unit === 0 ? size : size.toFixed(1)} ${units[unit]}`;
    }

    function formatNumber(value) {
      return new Intl.NumberFormat().format(value || 0);
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/`/g, "&#96;");
    }

    renderError("请输入 API key 后刷新。");
    if (el("apiKey").value) {
      load();
    }
  </script>
